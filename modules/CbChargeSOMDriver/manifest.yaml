description: Hardware abstraction layer for chargebyte's Charge SOM
config:
  connector_type:
    description: Type of charging connector available at this EVSE
    type: string
    enum:
      - IEC62196Type2Cable
      - IEC62196Type2Socket
    default: IEC62196Type2Cable
  min_current_A:
    description: >-
      The minimum current in ampere which can be imported/exported. The default value
      of 6 A corresponds to the lowest value which is technically possible to signal
      by the IEC 61851 standard via PWM.
    type: number
    default: 6
  max_current_A:
    description: >-
      The maximum current in ampere which can be imported/exported. Here too,
      the default corresponds to the maximum value which is possible to signal
      with the IEC 61851 standard. The value should be adjusted if there is no
      other limitating value/instance which represents the physical charger limits.
    type: number
    default: 80
  min_phase_count:
    description: >-
      Minimum number of AC phases the power electronics can use for both import and export.
    type: integer
    minimum: 1
    maximum: 3
    default: 1
  max_phase_count:
    description: >-
      Maximum number of AC phases the power electronics can use for both import and export.
    type: integer
    minimum: 1
    maximum: 3
    default: 3
  serial_port:
    description: >-
      Device name of the serial port to use for communication with the
      safety co-processor.
    type: string
    default: /dev/ttyLP2
  serial_debug:
    description: Enable debug messages in the communication library
    type: boolean
    default: false
  serial_trace:
    description: Enable debug output of the raw UART frames (to stdout)
    type: boolean
    default: false
  can_mirror_device:
    description: >-
      If set to a CAN interface, e.g. "vcan0", then all UART protocol frames
      are also mirrored to this interface as CAN packet. This allows to easily
      capture a trace for debugging purpose and/or visualizing signal changes.
      By default, this settings is an empty string which disabled this feature.
    type: string
    default: ""
  reset_gpio_line_name:
    description: >-
      The GPIO line name which is connected to the reset input of the
      safety co-processor.
    type: string
    default: nSAFETY_RESET_INT
  reset_active_low:
    description: The polarity of the reset GPIO line (active low = true, active high = false)
    type: boolean
    default: true
  pt1000_1_identification:
    description: Identification string used when this temperature channel is published
    type: string
    default: PT1000-1
  pt1000_2_identification:
    description: Identification string used when this temperature channel is published
    type: string
    default: PT1000-2
  pt1000_3_identification:
    description: Identification string used when this temperature channel is published
    type: string
    default: PT1000-3
  pt1000_4_identification:
    description: Identification string used when this temperature channel is published
    type: string
    default: PT1000-4
  grid_phase_count_gpio_line_name:
    description: >-
      The GPIO line name of the digital input to use for determining whether the charger
      is connected with three or one phase to the grid. When defined, then the GPIO should
      be 'active' to indicate that is is connected with three phases. When the GPIO
      signals only a single phase wiring, then features like phase count switching are
      disabled.
    type: string
    default: ""
  grid_phase_count_active_low:
    description: The GPIO polarity (active low = true, active high = false)
    type: boolean
    default: false
  contactor_1_feedback_type:
    description: >-
      Defines the logic behind the feedback
      - none = no feedback contact wired
      - nc = normally close
      - no = normally open
    type: string
    enum:
      - none
      - no
      - nc
    default: none
  contactor_2_feedback_type:
    description: >-
      Defines the logic behind the feedback
      - none = no feedback contact wired
      - nc = normally close
      - no = normally open
    type: string
    enum:
      - none
      - no
      - nc
    default: none
  switch_3ph1ph_wiring:
    description: >-
      Tells the implementation which wiring configuration for phase-count
      switching is used:
      - 'none': no phase-count switching setup
      - 'serial': the secondary contactor is wired in series to the primary contactor
      - 'simultaneous': the secondary contactor is wired in parallel to the primary contactor
      - 'mutual': the secondary contactor is wired in parallel to the primary contactor
      In 'serial' setups, the secondary contactor is closed before the primary
      contactor, and the primary contactor is opened before the secondary one.
      This ensures that the desired phases are offered to the vehicle at the same time.
      In 'simultaneous' setups, both the primary and the secondary contactors are closed
      and opened at the same time when all three phases are switched. In this setup, the
      primary contactor switches neutral and one phase, the secondary contactor switches
      the two remaining phases.
      Please note, that this setup is only permitted when a mechanical all-pole disconnect
      is guaranteed for emergency cases (e.g., RCD type B or EV).
      In 'mutual' setups, the primary contactor switches all available phases while the
      secondary contactor only switches a single phase. Both contactors are wired
      parallel, so that only exactly one contactor must be switched on at the same time.
      See user guide for wiring schematics and details.
      The 'primary' contactor is fixed 'Contactor 1' of the safety controller, and
      the 'secondary' contactor is fixed 'Contactor 2'.
    type: string
    enum:
      - none
      - serial
      - simultaneous
      - mutual
    default: none
provides:
  ac_rcd:
    description: >-
      Provide support for fault detection of an external AC Residual Current Device
    interface: ac_rcd
  evse_board_support:
    description: >-
      Provide the board support driver for the Charge SOM platform, e.g., control pilot
      monitoring and controlling, contactor switching and similar.
    interface: evse_board_support
  temperatures:
    description: Temperature readings as measured by the safety controller
    interface: cb_temperatures
